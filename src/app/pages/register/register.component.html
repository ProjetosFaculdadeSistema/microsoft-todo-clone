<section class="min-h-[calc(100vh-4rem)] bg-gradient-to-b from-green-50 to-white flex flex-col items-center justify-center px-4 py-10">
  <h1 class="text-3xl font-bold text-gray-900 mb-1">TaskMaster</h1>
  <p class="text-gray-600 mb-6 text-center">Crie sua conta e comece a organizar suas tarefas</p>

  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md text-center">
    <h2 class="text-lg font-semibold mb-2">Criar conta</h2>
    <p class="text-sm text-gray-500 mb-6">Crie sua conta para começar a organizar suas tarefas</p>

    <form (ngSubmit)="criarConta()" class="space-y-4">
      <input [(ngModel)]="name" name="name" placeholder="Seu nome completo"
        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:ring-blue-200" required>

      <input [(ngModel)]="email" name="email" type="email" placeholder="seu@email.com"
        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:ring-blue-200" required>

      <input [(ngModel)]="password" name="password" type="password" placeholder="Mínimo 6 caracteres"
        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:ring-blue-200" required>

      <input [(ngModel)]="confirmPassword" name="confirmPassword" type="password" placeholder="Confirme sua senha"
        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:ring-blue-200" required>

      <button type="submit" class="w-full bg-gray-900 text-white py-2 rounded hover:bg-gray-800">Criar conta</button>
    </form>

    <div *ngIf="erro" class="text-red-600 text-sm mt-4">{{ erro }}</div>
    <div *ngIf="sucesso" class="text-green-600 text-sm mt-4">Conta criada com sucesso! Redirecionando...</div>
  </div>

  <div class="mt-6 text-sm text-gray-600 text-center">
    Já tem uma conta? <a routerLink="/login" class="text-green-600 hover:underline">Entre aqui</a><br>
    Ou vá direto para o <a routerLink="/dashboard" class="text-green-600 hover:underline">Dashboard</a>
  </div>
</section>
