<section class="min-h-[calc(100vh-4rem)] bg-gradient-to-b from-indigo-50 to-white flex flex-col items-center justify-center px-4 py-10">
  <h1 class="text-3xl font-bold text-gray-900 mb-1">TaskMaster</h1>
  <p class="text-gray-600 mb-6 text-center">Organize suas tarefas de forma simples e eficiente</p>

  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md text-center">
    <h2 class="text-lg font-semibold mb-2">Entrar</h2>
    <p class="text-sm text-gray-500 mb-6">Entre com sua conta para acessar suas tarefas</p>

    <form (ngSubmit)="fazerLogin()" class="space-y-4">
      <div class="text-left text-sm font-medium text-gray-700">Email</div>
      <input [(ngModel)]="email" name="email" type="email" placeholder="seu@email.com"
        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:ring-blue-200" required>

      <div class="text-left text-sm font-medium text-gray-700">Senha</div>
      <input [(ngModel)]="password" name="password" type="password" placeholder="Sua senha"
        class="w-full px-4 py-2 border rounded focus:outline-none focus:ring focus:ring-blue-200" required>

      <button type="submit" class="w-full bg-gray-900 text-white py-2 rounded hover:bg-gray-800">Entrar</button>
    </form>

    <div *ngIf="erro" class="text-red-600 text-sm mt-4">{{ erro }}</div>
  </div>

  <div class="mt-6 text-sm text-gray-600 text-center">
    Não tem uma conta? <a routerLink="/registro" class="text-blue-600 hover:underline">Cadastre-se aqui</a><br>
    Ou vá direto para o <a routerLink="/dashboard" class="text-blue-600 hover:underline">Dashboard</a>
  </div>
</section>
